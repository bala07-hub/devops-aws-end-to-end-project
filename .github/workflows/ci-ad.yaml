#CI for Ad microservice

name: ad-ci

on:
  pull_request:
      branches:
      - main
jobs:
  build:
      runs-on: ubuntu-latest

      steps:
        - name: checkout code
          uses: actions/checkout@v6

 #JDK 21 + dependency caching (Maven or Gradle)
      # setup-java supports cache: maven|gradle
        - name: Set up JDK 21 (Maven cache)
          if: ${{ hashFiles(format('{0}/pom.xml', env.SERVICE_DIR)) != '' }}
          uses: actions/setup-java@v4
          with:
            distribution: temurin
            java-version: '21'
            cache: maven

        - name: Set up JDK 21 (Gradle cache)
          if: ${{ hashFiles(format('{0}/gradle/wrapper/gradle-wrapper.properties', env.SERVICE_DIR)) != '' || hashFiles(format('{0}/build.gradle*', env.SERVICE_DIR)) != '' }}
          uses: actions/setup-java@v4
          with:
            distribution: temurin
            java-version: '21'
            cache: gradle


        
      # Build & test (Maven)
        - name: Build & test with Maven
          if: ${{ hashFiles(format('{0}/pom.xml', env.SERVICE_DIR)) != '' }}
          working-directory: ${{ env.SERVICE_DIR }}
          run: |
           mvn -B -ntp verify

      # Build & test (Gradle)
        - name: Build & test with Gradle
          if: ${{ hashFiles(format('{0}/gradle/wrapper/gradle-wrapper.properties', env.SERVICE_DIR)) != '' || hashFiles(format('{0}/build.gradle*', env.SERVICE_DIR)) != '' }}
          working-directory: ${{ env.SERVICE_DIR }}
          run: |
           chmod +x ./gradlew || true
           ./gradlew --no-daemon clean check

  
  code-quality:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # JDK 21 again to run analyzers
      - name: Set up JDK 21 (Maven cache)
        if: ${{ hashFiles(format('{0}/pom.xml', env.SERVICE_DIR)) != '' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up JDK 21 (Gradle cache)
        if: ${{ hashFiles(format('{0}/gradle/wrapper/gradle-wrapper.properties', env.SERVICE_DIR)) != '' || hashFiles(format('{0}/build.gradle*', env.SERVICE_DIR)) != '' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      # --- Maven static analysis: SpotBugs + Checkstyle ---
      # Runs even if your POM doesn't preconfigure the plugins (uses goals directly).
      - name: SpotBugs (Maven)
        if: ${{ hashFiles(format('{0}/pom.xml', env.SERVICE_DIR)) != '' }}
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          mvn -B -ntp com.github.spotbugs:spotbugs-maven-plugin:4.9.8.2:check

      - name: Checkstyle (Maven)
        if: ${{ hashFiles(format('{0}/pom.xml', env.SERVICE_DIR)) != '' }}
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          mvn -B -ntp org.apache.maven.plugins:maven-checkstyle-plugin:3.6.0:check

      # --- Gradle static analysis ---
      # If your Gradle build applies the SpotBugs/Checkstyle plugins, `check` will run them.
      - name: Static analysis (Gradle) via check
        if: ${{ hashFiles(format('{0}/gradle/wrapper/gradle-wrapper.properties', env.SERVICE_DIR)) != '' || hashFiles(format('{0}/build.gradle*', env.SERVICE_DIR)) != '' }}
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          chmod +x ./gradlew || true
          ./gradlew --no-daemon check

  
  docker:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.SERVICE_DIR }}
          file: ${{ env.SERVICE_DIR }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:${{ github.run_id }}
            ${{ env.IMAGE_REPO }}:pr-${{ github.event.pull_request.number || 'manual' }}

  
  updatek8s:
    # Best practice: run only on push to main (not on PRs)
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Checkout with token
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in Kubernetes manifest
        run: |
          sed -i "s|image: .*|image: ${{ env.IMAGE_REPO }}:${{ github.run_id }}|" kubernetes/ad/deploy.yaml

      - name: Commit and push changes
        run: |
          git config --global user.email "balamanikanta.anantha@gmail.com"
          git config --global user.name "bala07-hub"
          git add kubernetes/ad/deploy.yaml
          git commit -m "[CI]: Update Ad-a-java image tag to ${{ github.run_id }}" || echo "No changes to commit"
          git push origin HEAD:main





            

