name: recommendation-python-ci

on:
  pull_request:
    branches: [ main ]

env:
  SERVICE_DIR: services/recommendation-python
  IMAGE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/recommendation-service

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.SERVICE_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install Python and enable pip caching
      - name: Set up Python 3.12 with pip cache
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip' # caches pip downloads keyed by lock/requirements file
          cache-dependency-path: |
            ${{ env.SERVICE_DIR }}/requirements*.txt

      - name: Install deps (prod + test)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Pytest (with coverage XML + terminal report)
        run: |
          # Option A: use coverage.py CLI for better control of reports
          python -m pip install coverage pytest
          coverage run -m pytest -q
          coverage xml -o coverage.xml
          coverage report -m

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: ${{ env.SERVICE_DIR }}/coverage.xml

  code-quality:
    runs-on: ubuntu-latest
    needs: build-test
    defaults:
      run:
        working-directory: ${{ env.SERVICE_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12 with pip cache
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            ${{ env.SERVICE_DIR }}/requirements*.txt

      - name: Install linters & type-checker
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      # Ruff: fast linter/formatter; configure via pyproject.toml or ruff.toml
      - name: Ruff lint
        run: ruff check --output-format=github .

      # mypy: reads config from pyproject.toml/mypy.ini/--config-file
      - name: mypy
        run: |
          mypy --version
          mypy .

  docker:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch builds, optional)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.SERVICE_DIR }}
          file: ${{ env.SERVICE_DIR }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:${{ github.sha }}
            ${{ env.IMAGE_REPO }}:pr-${{ github.event.pull_request.number || 'manual' }}

  updatek8s:
    # Only after merge to main
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update image tag in Kubernetes manifest
        run: |
          # Narrow replace: target container named "recommendation-service"
          sed -i -E "0,/(name: *recommendation-service)/{N; s|(image: ).*|\\1${{ env.IMAGE_REPO }}:${{ github.sha }}|}" \
            kubernetes/recommendation/deploy.yaml

      - name: Commit + push
        run: |
          git config user.email "balamanikanta.anantha@gmail.com"
          git config user.name "bala07-hub"
          git add kubernetes/recommendation/deploy.yaml
          git commit -m "[CI] Update recommendation image to ${{ github.sha }}" || echo "No changes"
          git push
